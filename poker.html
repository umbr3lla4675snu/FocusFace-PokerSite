<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나만의 포커 테이블 - 레이아웃 변경</title>
    <style>
        /* 전체 화면 배경: 어두운 카지노 톤 */
        body {
            background-color: #2c3e50;
            display: flex;
            flex-direction: column; /* 1. 테이블과 플레이어 영역을 세로로 나열 */
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            padding: 24px 16px 32px;
            margin: 0;
            font-family: sans-serif; /* 글꼴 변경 */
            box-sizing: border-box;
        }

        /* 2. 초록색 타원형 포커 테이블 (이제 안에는 커뮤니티 카드만 남음) */
        .poker-table {
            background-color: #27ae60;
            width: 800px;
            height: 350px; /* 카드가 나가서 높이를 조금 줄임 */
            border-radius: 175px;
            border: 15px solid #34495e;
            display: flex;
            justify-content: center; /* 3. 커뮤니티 카드를 중앙 정렬 */
            align-items: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
            box-sizing: border-box;
            margin-bottom: 30px; /* 테이블과 아래 플레이어 사이 간격 */
        }

        /* 커뮤니티 카드 영역 */
        .community-cards {
            display: flex;
            gap: 15px;
        }

        /* 🌟 4. 테이블 밖에 위치할 새로운 플레이어 전용 영역 🌟 */
        .player-zone {
            display: flex;
            flex-direction: column; /* 카드 아래 스택 */
            align-items: center;
            gap: 15px;
        }

        /* 내 카드 영역 */
        .player-cards {
            display: flex;
            gap: 15px;
        }

        /* 개별 카드의 기본 모양 */
        .card {
            width: 70px;
            height: 100px;
            background-color: white;
            border-radius: 8px;
            border: 1px solid #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 24px;
            box-shadow: 3px 3px 8px rgba(0,0,0,0.4);
        }

        /* 카드 색상 구분 */
        .spade, .club { color: black; }
        .heart, .diamond { color: red; }

        /* 🌟 5. 스택 디자인 수정 (숫자만 표시) 🌟 */
        .player-stack {
            color: #f1c40f; /* 황금색 글씨 */
            font-size: 32px; /* 칩 기호가 없으므로 숫자를 더 크게 */
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); /* 입체감 */
        }

        .control-panel {
            width: 800px;
            max-width: 100%;
            background-color: #1f2b38;
            border: 2px solid #3a4a5c;
            border-radius: 14px;
            padding: 14px;
            color: #ecf0f1;
            box-sizing: border-box;
            margin-top: 18px;
        }

        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .quick-guide {
            font-size: 12px;
            background-color: #0f1720;
            border: 1px solid #3d4f62;
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .popup-help {
            display: none;
            font-size: 12px;
            background-color: #3a1f1f;
            border: 1px solid #8e3b3b;
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .popup-help a {
            color: #9ecbff;
            margin-right: 10px;
        }

        .control-panel input {
            background-color: #0f1720;
            border: 1px solid #52657a;
            color: #ecf0f1;
            border-radius: 8px;
            padding: 8px 10px;
            min-width: 130px;
        }

        .control-panel button {
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            background-color: #3498db;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }

        .control-panel button.secondary {
            background-color: #16a085;
        }

        .control-panel button.warn {
            background-color: #c0392b;
        }

        .status {
            font-size: 14px;
            margin-bottom: 10px;
        }

        .debug-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .debug-card {
            background-color: #0f1720;
            border: 1px solid #52657a;
            border-radius: 8px;
            padding: 8px;
            box-sizing: border-box;
            min-height: 80px;
        }

        .debug-card h4 {
            margin: 0 0 6px;
            font-size: 13px;
            color: #9ecbff;
        }

        .tiny {
            font-size: 12px;
            line-height: 1.45;
            opacity: 0.95;
        }

        .player-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .player-table th,
        .player-table td {
            border-bottom: 1px solid #2c3d4f;
            padding: 4px;
            text-align: left;
        }

        .pill {
            display: inline-block;
            font-size: 11px;
            padding: 2px 7px;
            border-radius: 999px;
            margin-right: 6px;
            background-color: #2b3c4d;
        }

        .role-badge {
            display: inline-block;
            margin-left: 4px;
            padding: 1px 6px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: bold;
            color: #fff;
            vertical-align: middle;
        }

        .role-btn { background-color: #8e44ad; }
        .role-sb { background-color: #16a085; }
        .role-bb { background-color: #e67e22; }
        .role-turn { background-color: #c0392b; }
        .role-host { background-color: #2980b9; }

        .raw-json {
            max-height: 170px;
            overflow: auto;
            white-space: pre;
            font-family: Consolas, monospace;
            font-size: 11px;
            background-color: #0b1119;
            border: 1px solid #3d4f62;
            border-radius: 8px;
            padding: 8px;
            box-sizing: border-box;
        }

        .settings-pane {
            display: none;
            background-color: #0f1720;
            border: 1px solid #52657a;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
        }

        .settings-pane.open {
            display: block;
        }

        .levels {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-top: 8px;
        }

        .levels th,
        .levels td {
            border-bottom: 1px solid #2f4356;
            padding: 6px 4px;
            text-align: left;
            vertical-align: middle;
        }

        .levels input,
        .levels select {
            min-width: 80px;
            width: 100%;
            box-sizing: border-box;
        }

        .log {
            width: 100%;
            height: 180px;
            background-color: #0f1720;
            border: 1px solid #52657a;
            color: #ecf0f1;
            border-radius: 8px;
            padding: 10px;
            box-sizing: border-box;
            overflow-y: auto;
            font-family: Consolas, monospace;
            white-space: pre-wrap;
            word-break: break-word;
        }

        @media (max-width: 860px) {
            .poker-table {
                width: 100%;
                height: 260px;
                border-width: 10px;
            }

            .debug-grid {
                grid-template-columns: 1fr;
            }

            .card {
                width: 56px;
                height: 84px;
                font-size: 20px;
            }

            .player-stack {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>

    <div class="poker-table">
        <div class="community-cards">
            <div class="card" style="background-color: #2980b9; border: 2px solid white; color: white;">?</div>
            <div class="card" style="background-color: #2980b9; border: 2px solid white; color: white;">?</div>
            <div class="card" style="background-color: #2980b9; border: 2px solid white; color: white;">?</div>
            <div class="card" style="background-color: #2980b9; border: 2px solid white; color: white;">?</div>
            <div class="card" style="background-color: #2980b9; border: 2px solid white; color: white;">?</div>
        </div>
    </div>

    <div class="player-zone">
        <div class="player-cards">
            <div class="card" id="my-card-1">?</div>
            <div class="card" id="my-card-2">?</div>
        </div>
        
        <div class="player-stack" id="my-stack">
            1500
        </div>
    </div>

    <div class="control-panel">
        <div class="row">
            <input id="server-url" type="text" value="http://localhost:4000" placeholder="서버 URL">
            <input id="table-id" type="text" value="default" placeholder="테이블 ID">
            <input id="user-id" type="text" value="u1" placeholder="userId">
            <input id="nickname" type="text" value="player1" placeholder="닉네임">
        </div>

        <div class="row">
            <button id="btn-connect">연결</button>
            <button id="btn-disconnect" class="warn">연결 종료</button>
            <button id="btn-join" class="secondary">테이블 입장</button>
            <button id="btn-leave" class="warn">테이블 퇴장</button>
            <button id="btn-ready" class="secondary">READY</button>
            <button id="btn-call">CALL</button>
            <button id="btn-check">CHECK</button>
            <button id="btn-fold" class="warn">FOLD</button>
            <input id="raise-amount" type="number" min="1" value="40" style="max-width: 110px;" placeholder="RAISE TO">
            <button id="btn-raise">RAISE</button>
        </div>

        <div class="row">
            <button id="btn-toggle-settings" class="secondary">설정 패널 열기</button>
        </div>

        <div id="settings-pane" class="settings-pane">
            <div class="row">
                <button id="btn-start-hand">게임 시작</button>
                <input id="timeout-seconds" type="number" min="1" max="60" step="1" value="12" style="max-width: 150px;" placeholder="타임아웃(초)">
                <button id="btn-set-timeout" class="secondary">타임아웃 적용</button>
                <select id="host-target-user-id" style="max-width: 220px;"></select>
                <button id="btn-transfer-host" class="secondary">방장 변경</button>
            </div>
            <div class="row">
                <button id="btn-add-level" class="secondary">레벨 추가</button>
                <button id="btn-set-levels">레벨 적용</button>
                <button id="btn-reset-levels" class="secondary">서버값으로 되돌리기</button>
            </div>
            <table class="levels">
                <thead>
                    <tr>
                        <th style="width: 50px;">#</th>
                        <th>SB</th>
                        <th>BB</th>
                        <th>ANTE</th>
                        <th>Duration(분)</th>
                        <th style="width: 90px;">작업</th>
                    </tr>
                </thead>
                <tbody id="blind-level-rows"></tbody>
            </table>
        </div>

        <div class="row">
            <button id="btn-open-u1" class="secondary">테스트 탭 열기 (u1)</button>
            <button id="btn-open-u2" class="secondary">테스트 탭 열기 (u2)</button>
            <button id="btn-open-u3" class="secondary">테스트 탭 열기 (u3)</button>
            <button id="btn-open-u4" class="secondary">테스트 탭 열기 (u4)</button>
            <button id="btn-open-4p">4인 테스트 탭 열기</button>
            <button id="btn-copy-url">현재 설정 URL 복사</button>
        </div>

        <div class="row">
            <button id="btn-clear-log" class="secondary">로그 지우기</button>
            <label class="tiny"><input id="chk-verbose-state" type="checkbox"> table:state 전체 로그</label>
            <label class="tiny"><input id="chk-autoscroll" type="checkbox" checked> 자동 스크롤</label>
            <label class="tiny"><input id="chk-auto-play" type="checkbox"> 내 턴 자동 체크/콜</label>
        </div>

        <div class="quick-guide">
            빠른 테스트: 연결/입장/READY 후 플레이를 진행하세요.
            방장 설정(게임 시작, 타임아웃, 블라인드 레벨, 방장 변경)은 설정 패널 열기 버튼으로 같은 탭에서 관리할 수 있습니다.
        </div>

        <div id="popup-help" class="popup-help"></div>

        <div class="status" id="status">상태: 미연결</div>

        <div class="debug-grid">
            <div class="debug-card">
                <h4>핸드 상태</h4>
                <div class="tiny" id="hand-summary">스트리트: - | 팟: - | 현재 베팅: - | 현재 턴: -</div>
                <div class="tiny" id="action-order-summary">액션 순서 기준: -</div>
                <div class="tiny" id="host-summary">호스트: -</div>
                <div class="tiny" id="my-summary">내 좌석: - | 내 스택: -</div>
                <div class="tiny" id="sidepot-summary">사이드팟: -</div>
            </div>
            <div class="debug-card">
                <h4>이벤트 카운터</h4>
                <div class="tiny" id="event-counters"></div>
            </div>
            <div class="debug-card">
                <h4>플레이어 상태</h4>
                <div id="player-list" class="tiny">플레이어 없음</div>
            </div>
            <div class="debug-card">
                <h4>Raw table:state</h4>
                <div id="raw-state" class="raw-json">{}</div>
            </div>
        </div>

        <div class="log" id="log"></div>
    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js" crossorigin="anonymous"></script>

    <script>
        let socket = null;
        let mySeatNo = null;
        let lastAutoActionKey = "";
        let connectedUserId = null;

        const cardEls = [
            document.getElementById("my-card-1"),
            document.getElementById("my-card-2"),
        ];
        const communityEls = Array.from(document.querySelectorAll(".community-cards .card"));
        const stackEl = document.getElementById("my-stack");
        const statusEl = document.getElementById("status");
        const logEl = document.getElementById("log");
        const handSummaryEl = document.getElementById("hand-summary");
        const actionOrderSummaryEl = document.getElementById("action-order-summary");
        const hostSummaryEl = document.getElementById("host-summary");
        const mySummaryEl = document.getElementById("my-summary");
        const sidepotSummaryEl = document.getElementById("sidepot-summary");
        const eventCountersEl = document.getElementById("event-counters");
        const rawStateEl = document.getElementById("raw-state");
        const playerListEl = document.getElementById("player-list");
        const popupHelpEl = document.getElementById("popup-help");
        const chkVerboseStateEl = document.getElementById("chk-verbose-state");
        const chkAutoscrollEl = document.getElementById("chk-autoscroll");
        const chkAutoPlayEl = document.getElementById("chk-auto-play");

        const inputServerUrl = document.getElementById("server-url");
        const inputTableId = document.getElementById("table-id");
        const inputUserId = document.getElementById("user-id");
        const inputNickname = document.getElementById("nickname");
        const inputRaiseAmount = document.getElementById("raise-amount");
        const inputTimeoutSeconds = document.getElementById("timeout-seconds");
        const selectHostTarget = document.getElementById("host-target-user-id");
        const levelsTbodyEl = document.getElementById("blind-level-rows");
        const settingsPaneEl = document.getElementById("settings-pane");

        const eventCount = {};
        let lastTableState = null;
        let localLevelsDirty = false;

        function paramsToQueryString(params) {
            return new URLSearchParams(params).toString();
        }

        function getEffectiveUserId() {
            return connectedUserId || inputUserId.value.trim();
        }

        function buildPresetUrl(user, nick) {
            const params = {
                server: inputServerUrl.value.trim(),
                table: inputTableId.value.trim(),
                user,
                nick,
                autoconnect: "1",
                autojoin: "1",
                autoready: "1",
                autoplay: chkAutoPlayEl.checked ? "1" : "0",
            };

            return `${window.location.pathname}?${paramsToQueryString(params)}`;
        }

        function buildEmptyLevel() {
            return { smallBlind: 10, bigBlind: 20, ante: 0, durationMinutes: 5 };
        }

        function createLevelRow(level, index) {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td><input type="number" min="1" step="1" data-field="smallBlind" value="${level.smallBlind}"></td>
                <td><input type="number" min="1" step="1" data-field="bigBlind" value="${level.bigBlind}"></td>
                <td><input type="number" min="0" step="1" data-field="ante" value="${level.ante}"></td>
                <td><input type="number" min="1" step="1" data-field="durationMinutes" value="${level.durationMinutes}"></td>
                <td><button class="warn" data-action="remove">삭제</button></td>
            `;
            return tr;
        }

        function renderLevelRows(levels) {
            levelsTbodyEl.innerHTML = "";
            levels.forEach((level, idx) => {
                levelsTbodyEl.appendChild(createLevelRow(level, idx));
            });
        }

        function collectLevelsFromForm() {
            const rows = Array.from(levelsTbodyEl.querySelectorAll("tr"));
            const levels = rows.map((row) => {
                const read = (field) => Number(row.querySelector(`input[data-field='${field}']`).value);
                return {
                    smallBlind: read("smallBlind"),
                    bigBlind: read("bigBlind"),
                    ante: read("ante"),
                    durationMinutes: read("durationMinutes"),
                };
            });

            if (levels.length === 0) {
                throw new Error("레벨은 최소 1개 이상 필요합니다.");
            }

            for (const level of levels) {
                if (!Number.isInteger(level.smallBlind) || level.smallBlind < 1) {
                    throw new Error("smallBlind는 1 이상 정수여야 합니다.");
                }
                if (!Number.isInteger(level.bigBlind) || level.bigBlind < level.smallBlind) {
                    throw new Error("bigBlind는 smallBlind 이상 정수여야 합니다.");
                }
                if (!Number.isInteger(level.ante) || level.ante < 0) {
                    throw new Error("ante는 0 이상 정수여야 합니다.");
                }
                if (!Number.isInteger(level.durationMinutes) || level.durationMinutes < 1) {
                    throw new Error("durationMinutes는 1 이상 정수(분)여야 합니다.");
                }
            }

            return levels;
        }

        function renderHostCandidates(state) {
            const prev = selectHostTarget.value;
            const players = Array.isArray(state.players) ? state.players : [];
            selectHostTarget.innerHTML = "";

            players
                .filter((p) => p.userId !== state.hostUserId)
                .forEach((p) => {
                    const opt = document.createElement("option");
                    opt.value = p.userId;
                    opt.textContent = `${p.nickname} (${p.userId})`;
                    selectHostTarget.appendChild(opt);
                });

            if (prev && Array.from(selectHostTarget.options).some((o) => o.value === prev)) {
                selectHostTarget.value = prev;
            }
        }

        function hidePopupHelp() {
            popupHelpEl.style.display = "none";
            popupHelpEl.innerHTML = "";
        }

        function showPopupHelp(blockedItems) {
            if (!Array.isArray(blockedItems) || blockedItems.length === 0) {
                hidePopupHelp();
                return;
            }

            const links = blockedItems
                .map((item) => `<a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.nick} 열기</a>`)
                .join("");

            popupHelpEl.style.display = "block";
            popupHelpEl.innerHTML = `팝업 차단으로 일부 탭이 열리지 않았습니다. 아래 링크를 클릭하거나, 이 사이트의 팝업 허용 후 다시 시도하세요.<br>${links}`;
        }

        function applyQueryParams() {
            const qs = new URLSearchParams(window.location.search);

            const serverUrl = qs.get("server");
            const tableId = qs.get("table");
            const userId = qs.get("user");
            const nickname = qs.get("nick");

            if (serverUrl) inputServerUrl.value = serverUrl;
            if (tableId) inputTableId.value = tableId;
            if (userId) inputUserId.value = userId;
            if (nickname) inputNickname.value = nickname;

            const autoPlay = qs.get("autoplay");
            chkAutoPlayEl.checked = autoPlay === "1";

            const autoConnect = qs.get("autoconnect") === "1";
            const autoJoin = qs.get("autojoin") === "1";
            const autoReady = qs.get("autoready") === "1";

            if (!autoConnect) {
                return;
            }

            ensureSocket();

            if (autoJoin) {
                setTimeout(() => {
                    if (!socket || !socket.connected) {
                        return;
                    }
                    socket.emit("table:join", { tableId: inputTableId.value.trim() });
                    appendLog("emit table:join (auto)", { tableId: inputTableId.value.trim() });

                    if (autoReady) {
                        setTimeout(() => {
                            if (!socket || !socket.connected) {
                                return;
                            }
                            socket.emit("player:ready", {});
                            appendLog("emit player:ready (auto)");
                        }, 250);
                    }
                }, 250);
            }
        }

        function updateHostControls(state) {
            const effectiveUserId = getEffectiveUserId();
            const me = Array.isArray(state.players)
                ? state.players.find((p) => p.userId === effectiveUserId)
                : null;
            const isHost = Boolean((me && me.isHost) || (effectiveUserId && state.hostUserId === effectiveUserId));

            document.getElementById("btn-start-hand").disabled = !isHost;
            document.getElementById("btn-set-timeout").disabled = !isHost;
            document.getElementById("btn-transfer-host").disabled = !isHost;
            document.getElementById("btn-add-level").disabled = !isHost;
            document.getElementById("btn-set-levels").disabled = !isHost;
            document.getElementById("btn-reset-levels").disabled = !isHost;
            inputTimeoutSeconds.disabled = !isHost;
            selectHostTarget.disabled = !isHost;

            levelsTbodyEl.querySelectorAll("input, button[data-action='remove']").forEach((el) => {
                el.disabled = !isHost;
            });
        }

        function suitSymbol(suit) {
            if (suit === "S") return "♠";
            if (suit === "H") return "♥";
            if (suit === "D") return "♦";
            if (suit === "C") return "♣";
            return "?";
        }

        function paintCard(element, card) {
            if (!card) {
                element.textContent = "?";
                element.style.color = "#fff";
                element.style.backgroundColor = "#2980b9";
                element.style.border = "2px solid white";
                return;
            }

            const red = card.suit === "H" || card.suit === "D";
            element.textContent = card.rank + suitSymbol(card.suit);
            element.style.color = red ? "#c0392b" : "#111";
            element.style.backgroundColor = "#fff";
            element.style.border = "1px solid #ccc";
        }

        function renderEventCounters() {
            const keys = Object.keys(eventCount);
            if (keys.length === 0) {
                eventCountersEl.textContent = "이벤트 수신 전";
                return;
            }

            eventCountersEl.innerHTML = keys
                .sort()
                .map((k) => `<span class="pill">${k}: ${eventCount[k]}</span>`)
                .join("");
        }

        function tickEvent(name) {
            eventCount[name] = (eventCount[name] || 0) + 1;
            renderEventCounters();
        }

        function appendLog(title, payload, options = {}) {
            const skip = options.skip === true;
            if (skip) {
                return;
            }

            const time = new Date().toLocaleTimeString();
            const line = `[${time}] ${title}`;
            const body = payload ? `\n${JSON.stringify(payload, null, 2)}` : "";
            logEl.textContent += `${line}${body}\n\n`;

            if (chkAutoscrollEl.checked) {
                logEl.scrollTop = logEl.scrollHeight;
            }

            console.log(line, payload || "");
        }

        function setStatus(text) {
            statusEl.textContent = `상태: ${text}`;
        }

        function maybeAutoPlay(state) {
            if (!chkAutoPlayEl.checked || !socket || !socket.connected || !state || !state.hand) {
                return;
            }

            const hand = state.hand;
            if (!Array.isArray(state.players) || !hand.currentTurnSeatNo) {
                return;
            }

            const me = state.players.find((p) => p.userId === getEffectiveUserId());
            if (!me || me.isFolded || me.seatNo !== hand.currentTurnSeatNo) {
                return;
            }

            const actionType = me.contribution === hand.currentBet ? "check" : "call";
            const key = [hand.handId, hand.street, hand.currentTurnSeatNo, me.contribution, hand.currentBet, actionType].join("|");
            if (key === lastAutoActionKey) {
                return;
            }
            lastAutoActionKey = key;

            setTimeout(() => {
                if (!socket || !socket.connected) {
                    return;
                }
                socket.emit("hand:action", { actionType });
                appendLog("emit hand:action (auto)", { actionType });
            }, 120);
        }

        function renderTableState(state) {
            if (!state) {
                return;
            }

            lastTableState = state;
            rawStateEl.textContent = JSON.stringify(state, null, 2);

            const effectiveUserId = getEffectiveUserId();
            const me = Array.isArray(state.players)
                ? state.players.find((p) => p.userId === effectiveUserId)
                : null;

            if (me) {
                mySeatNo = me.seatNo;
                stackEl.textContent = String(me.stack);
            }

            mySummaryEl.textContent = `내 좌석: ${mySeatNo ?? "-"} | 내 스택: ${me ? me.stack : "-"}`;

            const hand = state.hand;
            const deadlineText = hand && hand.actionDeadlineAt
                ? Math.max(0, Math.ceil((hand.actionDeadlineAt - Date.now()) / 1000)) + "s"
                : "-";
            const timeoutSecondsText = hand && hand.actionTimeoutMs ? `${Math.round(hand.actionTimeoutMs / 1000)}s` : "-";
            const activeLevel = hand
                ? { smallBlind: hand.smallBlind, bigBlind: hand.bigBlind, ante: hand.ante, index: hand.blindLevelIndex }
                : { smallBlind: state.smallBlind, bigBlind: state.bigBlind, ante: 0, index: state.blindLevelIndex };
            const nextLevel = Array.isArray(state.blindLevels) && state.blindLevels[state.blindLevelIndex + 1]
                ? state.blindLevels[state.blindLevelIndex + 1]
                : null;
            const buttonText = state.buttonSeatNo ?? "-";
            const hostText = state.hostUserId ?? "-";
            const dealerText = hand && hand.dealerSeatNo ? hand.dealerSeatNo : "-";
            const sbText = hand && hand.smallBlindSeatNo ? hand.smallBlindSeatNo : "-";
            const bbText = hand && hand.bigBlindSeatNo ? hand.bigBlindSeatNo : "-";
            const levelCountText = Array.isArray(state.blindLevels) ? `${state.blindLevelIndex + 1}/${state.blindLevels.length}` : "-";
            handSummaryEl.textContent = hand
                ? `스트리트: ${hand.street} | 팟: ${hand.pot} | 현재 베팅: ${hand.currentBet} | 최소 레이즈: ${hand.minRaise} | 레벨: ${levelCountText} | 현재 블라인드: ${activeLevel.smallBlind}/${activeLevel.bigBlind}/A${activeLevel.ante} | 다음 레벨: ${nextLevel ? `${nextLevel.smallBlind}/${nextLevel.bigBlind}/A${nextLevel.ante}` : "-"} | BTN(table): ${buttonText} | DEALER: ${dealerText} | SB: ${sbText} | BB: ${bbText} | 현재 턴: ${hand.currentTurnSeatNo} | 타임아웃: ${deadlineText} / ${timeoutSecondsText}`
                : `스트리트: waiting | 팟: 0 | 현재 베팅: 0 | 레벨: ${levelCountText} | 현재 블라인드: ${activeLevel.smallBlind}/${activeLevel.bigBlind}/A${activeLevel.ante} | 다음 레벨: ${nextLevel ? `${nextLevel.smallBlind}/${nextLevel.bigBlind}/A${nextLevel.ante}` : "-"} | BTN(table): ${buttonText} | 현재 턴: - | 타임아웃: -`;

            hostSummaryEl.textContent = `호스트: ${hostText}`;
            renderHostCandidates(state);

            const timeoutSec = Math.max(1, Math.round((state.actionTimeoutMs ?? 12000) / 1000));
            if (document.activeElement !== inputTimeoutSeconds) {
                inputTimeoutSeconds.value = String(timeoutSec);
            }

            if (!localLevelsDirty && Array.isArray(state.pendingBlindLevels)) {
                renderLevelRows(state.pendingBlindLevels);
            }

            actionOrderSummaryEl.textContent = hand
                ? (hand.street === "preflop"
                    ? `액션 순서 기준: 프리플랍은 BB 다음 좌석부터 시작 (헤즈업은 BTN/SB가 먼저)`
                    : `액션 순서 기준: 포스트플랍은 BTN 다음 좌석부터 시작`)
                : "액션 순서 기준: -";

            if (hand && Array.isArray(hand.sidePots) && hand.sidePots.length > 0) {
                sidepotSummaryEl.textContent = "사이드팟: " + hand.sidePots
                    .map((sp, idx) => `#${idx + 1} ${sp.amount} [${Array.isArray(sp.eligibleSeatNos) ? sp.eligibleSeatNos.join(",") : ""}]`)
                    .join(" | ");
            } else {
                sidepotSummaryEl.textContent = "사이드팟: -";
            }

            if (Array.isArray(state.players) && state.players.length > 0) {
                const rows = state.players
                    .map((p) => {
                        const meTag = p.userId === effectiveUserId ? "(ME)" : "";
                        const roleTags = [];
                        if (p.isHost) roleTags.push('<span class="role-badge role-host">HOST</span>');
                        if (state.buttonSeatNo === p.seatNo) roleTags.push('<span class="role-badge role-btn">BTN</span>');
                        if (hand && hand.smallBlindSeatNo === p.seatNo) roleTags.push('<span class="role-badge role-sb">SB</span>');
                        if (hand && hand.bigBlindSeatNo === p.seatNo) roleTags.push('<span class="role-badge role-bb">BB</span>');
                        if (hand && hand.currentTurnSeatNo === p.seatNo) roleTags.push('<span class="role-badge role-turn">TURN</span>');

                        return `<tr><td>${p.seatNo}${meTag}</td><td>${p.nickname} ${roleTags.join("")}</td><td>${p.stack}</td><td>${p.contribution}</td><td>${p.totalContribution ?? "-"}</td><td>${p.isFolded}</td><td>${p.isReady}</td></tr>`;
                    })
                    .join("");

                playerListEl.innerHTML = `<table class="player-table"><thead><tr><th>좌석</th><th>닉네임/역할</th><th>스택</th><th>현재기여</th><th>총기여</th><th>폴드</th><th>READY</th></tr></thead><tbody>${rows}</tbody></table>`;
            } else {
                playerListEl.textContent = "플레이어 없음";
            }

            const communityCards = state.hand && Array.isArray(state.hand.communityCards)
                ? state.hand.communityCards
                : [];

            for (let i = 0; i < communityEls.length; i += 1) {
                paintCard(communityEls[i], communityCards[i]);
            }

            appendLog("table:state", {
                hand: state.hand,
                players: state.players,
            }, {
                skip: !chkVerboseStateEl.checked,
            });

            updateHostControls(state);
            maybeAutoPlay(state);
        }

        function bindSocketEvents() {
            socket.on("connect", () => {
                tickEvent("connect");
                setStatus(`연결됨 (${socket.id})`);
                appendLog("connect", { socketId: socket.id });
            });

            socket.on("disconnect", (reason) => {
                tickEvent("disconnect");
                setStatus(`연결 종료 (${reason})`);
                appendLog("disconnect", { reason });
            });

            socket.on("system:connected", (payload) => {
                tickEvent("system:connected");
                appendLog("system:connected", payload);
            });

            socket.on("table:state", (state) => {
                tickEvent("table:state");
                renderTableState(state);
            });

            socket.on("player:private", (payload) => {
                tickEvent("player:private");
                if (!payload || !Array.isArray(payload.holeCards)) {
                    return;
                }

                for (let i = 0; i < cardEls.length; i += 1) {
                    paintCard(cardEls[i], payload.holeCards[i]);
                }

                appendLog("player:private", payload);
            });

            socket.on("hand:action_applied", (payload) => {
                tickEvent("hand:action_applied");
                appendLog("hand:action_applied", payload);
            });

            socket.on("error:event", (payload) => {
                tickEvent("error:event");
                appendLog("error:event", payload);
            });
        }

        function ensureSocket() {
            if (socket && socket.connected) {
                return;
            }

            const serverUrl = inputServerUrl.value.trim();
            const userId = inputUserId.value.trim();
            const nickname = inputNickname.value.trim();

            connectedUserId = userId;

            socket = io(serverUrl, {
                auth: {
                    userId,
                    nickname,
                },
                transports: ["websocket"],
            });

            bindSocketEvents();
            setStatus("연결 시도 중...");
        }

        document.getElementById("btn-connect").addEventListener("click", () => {
            ensureSocket();
        });

        document.getElementById("btn-disconnect").addEventListener("click", () => {
            if (!socket) {
                return;
            }
            socket.disconnect();
        });

        document.getElementById("btn-clear-log").addEventListener("click", () => {
            logEl.textContent = "";
            appendLog("system", { message: "로그를 지웠습니다." });
        });

        document.getElementById("btn-leave").addEventListener("click", () => {
            if (!socket || !socket.connected) {
                appendLog("warn", { message: "먼저 연결하세요." });
                return;
            }

            socket.emit("table:leave", {});
            appendLog("emit table:leave");
        });

        document.getElementById("btn-join").addEventListener("click", () => {
            if (!socket || !socket.connected) {
                ensureSocket();
            }
            const tableId = inputTableId.value.trim();
            socket.emit("table:join", { tableId });
            appendLog("emit table:join", { tableId });
        });

        document.getElementById("btn-ready").addEventListener("click", () => {
            if (!socket || !socket.connected) {
                appendLog("warn", { message: "먼저 연결하세요." });
                return;
            }
            socket.emit("player:ready", {});
            appendLog("emit player:ready");
        });

        document.getElementById("btn-call").addEventListener("click", () => {
            if (!socket || !socket.connected) {
                appendLog("warn", { message: "먼저 연결하세요." });
                return;
            }
            socket.emit("hand:action", { actionType: "call" });
            appendLog("emit hand:action", { actionType: "call" });
        });

        document.getElementById("btn-check").addEventListener("click", () => {
            if (!socket || !socket.connected) {
                appendLog("warn", { message: "먼저 연결하세요." });
                return;
            }
            socket.emit("hand:action", { actionType: "check" });
            appendLog("emit hand:action", { actionType: "check" });
        });

        document.getElementById("btn-fold").addEventListener("click", () => {
            if (!socket || !socket.connected) {
                appendLog("warn", { message: "먼저 연결하세요." });
                return;
            }
            socket.emit("hand:action", { actionType: "fold" });
            appendLog("emit hand:action", { actionType: "fold" });
        });

        document.getElementById("btn-toggle-settings").addEventListener("click", () => {
            settingsPaneEl.classList.toggle("open");
            const opened = settingsPaneEl.classList.contains("open");
            document.getElementById("btn-toggle-settings").textContent = opened ? "설정 패널 닫기" : "설정 패널 열기";
            appendLog("system", { message: opened ? "설정 패널을 열었습니다." : "설정 패널을 닫았습니다." });
        });

        document.getElementById("btn-start-hand").addEventListener("click", () => {
            if (!socket || !socket.connected) {
                appendLog("warn", { message: "먼저 연결하세요." });
                return;
            }
            socket.emit("table:start", {});
            appendLog("emit table:start");
        });

        document.getElementById("btn-set-timeout").addEventListener("click", () => {
            if (!socket || !socket.connected) {
                appendLog("warn", { message: "먼저 연결하세요." });
                return;
            }

            const timeoutSeconds = Number(inputTimeoutSeconds.value);
            if (!Number.isInteger(timeoutSeconds) || timeoutSeconds < 1 || timeoutSeconds > 60) {
                appendLog("warn", { message: "타임아웃은 1~60초 사이 정수여야 합니다." });
                return;
            }

            socket.emit("table:update_settings", { actionTimeoutMs: timeoutSeconds * 1000 });
            appendLog("emit table:update_settings", { timeoutSeconds });
        });

        document.getElementById("btn-transfer-host").addEventListener("click", () => {
            if (!socket || !socket.connected) {
                appendLog("warn", { message: "먼저 연결하세요." });
                return;
            }

            const targetUserId = selectHostTarget.value;
            if (!targetUserId) {
                appendLog("warn", { message: "방장 변경 대상이 없습니다." });
                return;
            }

            socket.emit("table:transfer_host", { targetUserId });
            appendLog("emit table:transfer_host", { targetUserId });
        });

        document.getElementById("btn-add-level").addEventListener("click", () => {
            let levels;
            try {
                levels = collectLevelsFromForm();
            } catch {
                levels = [buildEmptyLevel()];
            }

            const last = levels[levels.length - 1] ?? buildEmptyLevel();
            levels.push({
                smallBlind: Math.max(1, last.smallBlind * 2),
                bigBlind: Math.max(1, last.bigBlind * 2),
                ante: Math.max(0, last.ante),
                durationMinutes: Math.max(1, last.durationMinutes),
            });

            renderLevelRows(levels);
            localLevelsDirty = true;
        });

        document.getElementById("btn-reset-levels").addEventListener("click", () => {
            if (!lastTableState || !Array.isArray(lastTableState.pendingBlindLevels)) {
                appendLog("warn", { message: "서버에서 받은 레벨 정보가 없습니다." });
                return;
            }
            renderLevelRows(lastTableState.pendingBlindLevels);
            localLevelsDirty = false;
            appendLog("reset levels", { count: lastTableState.pendingBlindLevels.length });
        });

        document.getElementById("btn-set-levels").addEventListener("click", () => {
            if (!socket || !socket.connected) {
                appendLog("warn", { message: "먼저 연결하세요." });
                return;
            }

            let levels;
            try {
                levels = collectLevelsFromForm();
            } catch (error) {
                appendLog("warn", { message: error instanceof Error ? error.message : "레벨 입력 오류" });
                return;
            }

            socket.emit("table:update_settings", { blindLevels: levels });
            appendLog("emit table:update_settings", { blindLevels: levels });
            localLevelsDirty = false;
        });

        levelsTbodyEl.addEventListener("click", (event) => {
            const target = event.target;
            if (!(target instanceof HTMLElement) || target.dataset.action !== "remove") {
                return;
            }

            const rows = Array.from(levelsTbodyEl.querySelectorAll("tr"));
            if (rows.length <= 1) {
                appendLog("warn", { message: "최소 1개 레벨은 유지해야 합니다." });
                return;
            }

            const row = target.closest("tr");
            if (!row) {
                return;
            }
            row.remove();

            Array.from(levelsTbodyEl.querySelectorAll("tr")).forEach((tr, idx) => {
                const noCell = tr.querySelector("td");
                if (noCell) {
                    noCell.textContent = String(idx + 1);
                }
            });

            localLevelsDirty = true;
        });

        levelsTbodyEl.addEventListener("input", () => {
            localLevelsDirty = true;
        });

        document.getElementById("btn-raise").addEventListener("click", () => {
            if (!socket || !socket.connected) {
                appendLog("warn", { message: "먼저 연결하세요." });
                return;
            }

            const amount = Number(inputRaiseAmount.value);
            if (!Number.isInteger(amount) || amount <= 0) {
                appendLog("warn", { message: "올바른 레이즈 금액을 입력하세요." });
                return;
            }

            socket.emit("hand:action", { actionType: "raise", amount });
            appendLog("emit hand:action", { actionType: "raise", amount });
        });

        document.getElementById("btn-open-u1").addEventListener("click", () => {
            openPresetTab("u1", "player1");
        });

        document.getElementById("btn-open-u2").addEventListener("click", () => {
            openPresetTab("u2", "player2");
        });

        document.getElementById("btn-open-u3").addEventListener("click", () => {
            openPresetTab("u3", "player3");
        });

        document.getElementById("btn-open-u4").addEventListener("click", () => {
            openPresetTab("u4", "player4");
        });

        document.getElementById("btn-open-4p").addEventListener("click", () => {
            hidePopupHelp();

            const presets = [
                { user: "u1", nick: "player1" },
                { user: "u2", nick: "player2" },
                { user: "u3", nick: "player3" },
                { user: "u4", nick: "player4" },
            ];

            const blockedItems = [];
            for (const preset of presets) {
                const url = buildPresetUrl(preset.user, preset.nick);
                const opened = window.open(url, "_blank");
                if (!opened) {
                    blockedItems.push({ ...preset, url });
                }
            }

            if (blockedItems.length > 0) {
                showPopupHelp(blockedItems);
                appendLog("warn", {
                    message: "팝업 차단으로 일부 탭이 열리지 않았습니다. 링크를 수동으로 열거나 팝업 허용 후 다시 시도하세요.",
                    blockedCount: blockedItems.length,
                    blockedUsers: blockedItems.map((item) => item.user),
                });
            }
        });

        function openPresetTab(user, nick) {
            hidePopupHelp();
            const url = buildPresetUrl(user, nick);
            const opened = window.open(url, "_blank");

            if (!opened) {
                showPopupHelp([{ user, nick, url }]);
                appendLog("warn", {
                    message: "팝업 차단으로 탭 열기에 실패했습니다. 브라우저에서 팝업 허용이 필요합니다.",
                    user,
                    url,
                });
            }
        }

        document.getElementById("btn-copy-url").addEventListener("click", async () => {
            const params = {
                server: inputServerUrl.value.trim(),
                table: inputTableId.value.trim(),
                user: inputUserId.value.trim(),
                nick: inputNickname.value.trim(),
                autoconnect: "1",
                autojoin: "1",
                autoready: "0",
                autoplay: chkAutoPlayEl.checked ? "1" : "0",
            };
            const url = `${window.location.origin}${window.location.pathname}?${paramsToQueryString(params)}`;

            try {
                await navigator.clipboard.writeText(url);
                appendLog("system", { message: "현재 설정 URL을 클립보드에 복사했습니다.", url });
            } catch {
                appendLog("system", { message: "클립보드 복사에 실패했습니다.", url });
            }
        });

        appendLog("ready", {
            message: "서버 실행 후 호스트가 타임아웃을 설정하고 게임 시작을 눌러서 테스트하세요.",
        });
        renderEventCounters();
        renderLevelRows([buildEmptyLevel()]);
        applyQueryParams();
    </script>
</body>
</html>
