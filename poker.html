<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나만의 포커 테이블 - 레이아웃 변경</title>
    <style>
        /* 전체 화면 배경: 어두운 카지노 톤 */
        body {
            background-color: #2c3e50;
            display: flex;
            flex-direction: column; /* 1. 테이블과 플레이어 영역을 세로로 나열 */
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif; /* 글꼴 변경 */
        }

        /* 2. 초록색 타원형 포커 테이블 (이제 안에는 커뮤니티 카드만 남음) */
        .poker-table {
            background-color: #27ae60;
            width: 800px;
            height: 350px; /* 카드가 나가서 높이를 조금 줄임 */
            border-radius: 175px;
            border: 15px solid #34495e;
            display: flex;
            justify-content: center; /* 3. 커뮤니티 카드를 중앙 정렬 */
            align-items: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
            box-sizing: border-box;
            margin-bottom: 30px; /* 테이블과 아래 플레이어 사이 간격 */
        }

        /* 커뮤니티 카드 영역 */
        .community-cards {
            display: flex;
            gap: 15px;
        }

        /* 🌟 4. 테이블 밖에 위치할 새로운 플레이어 전용 영역 🌟 */
        .player-zone {
            display: flex;
            flex-direction: column; /* 카드 아래 스택 */
            align-items: center;
            gap: 15px;
        }

        /* 내 카드 영역 */
        .player-cards {
            display: flex;
            gap: 15px;
        }

        /* 개별 카드의 기본 모양 */
        .card {
            width: 70px;
            height: 100px;
            background-color: white;
            border-radius: 8px;
            border: 1px solid #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 24px;
            box-shadow: 3px 3px 8px rgba(0,0,0,0.4);
        }

        /* 카드 색상 구분 */
        .spade, .club { color: black; }
        .heart, .diamond { color: red; }

        /* 🌟 5. 스택 디자인 수정 (숫자만 표시) 🌟 */
        .player-stack {
            color: #f1c40f; /* 황금색 글씨 */
            font-size: 32px; /* 칩 기호가 없으므로 숫자를 더 크게 */
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); /* 입체감 */
        }
    </style>
</head>
<body>

    <div class="poker-table">
        <div class="community-cards">
            <div class="card" style="background-color: #2980b9; border: 2px solid white; color: white;">?</div>
            <div class="card" style="background-color: #2980b9; border: 2px solid white; color: white;">?</div>
            <div class="card" style="background-color: #2980b9; border: 2px solid white; color: white;">?</div>
            <div class="card" style="background-color: #2980b9; border: 2px solid white; color: white;">?</div>
            <div class="card" style="background-color: #2980b9; border: 2px solid white; color: white;">?</div>
        </div>
    </div>

    <div class="player-zone">
        <div class="player-cards">
            <div class="card spade">A♠</div>
            <div class="card heart">K♥</div>
        </div>
        
        <div class="player-stack">
            1500
        </div>
    </div>

    <script>
        // 다음 단계를 위한 JavaScript 공간 (지금은 비워둡니다)
    </script>
</body>
</html>
